<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>فلكرين | مدونة الفيجوال نوفل</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Cairo;
background:#f8fafc;
}

.article img{
border-radius:12px;
margin:20px 0;
max-width:100%;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.editor{
min-height:300px;
border:2px dashed #6366f1;
padding:20px;
border-radius:12px;
background:white;
}

</style>

</head>

<body>

<header class="bg-indigo-600 text-white p-5">

<h1 class="text-3xl font-bold">فلكرين</h1>
<p>مدونة الفيجوال نوفل والترجمة</p>

</header>

<main class="max-w-6xl mx-auto p-6">

<div class="flex justify-between mb-6">

<h2 class="text-2xl font-bold">المقالات</h2>

<button id="newPost"
class="bg-indigo-600 text-white px-4 py-2 rounded">
مقال جديد
</button>

</div>

<div id="posts" class="grid md:grid-cols-3 gap-6"></div>

</main>

<!-- محرر المقال -->

<div id="editorModal"
class="fixed inset-0 bg-black/60 hidden items-center justify-center">

<div class="bg-white p-6 w-full max-w-3xl rounded-xl">

<h3 class="text-xl font-bold mb-4">محرر المقال</h3>

<input id="title"
placeholder="عنوان المقال"
class="w-full border p-2 rounded mb-4">

<div
id="editor"
contenteditable="true"
class="editor"></div>

<div class="flex gap-3 mt-4">

<button id="save"
class="bg-green-600 text-white px-4 py-2 rounded">
حفظ
</button>

<button id="close"
class="bg-gray-400 text-white px-4 py-2 rounded">
إغلاق
</button>

</div>

</div>
</div>

<script>

const ADMIN_USER="flkrin1171"
const ADMIN_PASS="Kareemiop123a@"

let posts=JSON.parse(localStorage.getItem("posts")||"[]")

const postsDiv=document.getElementById("posts")

function renderPosts(){

postsDiv.innerHTML=""

posts.forEach((p,i)=>{

postsDiv.innerHTML+=`

<div class="bg-white rounded-xl shadow overflow-hidden">

<img src="${p.image}" class="h-48 w-full object-cover">

<div class="p-4">

<h3 class="text-xl font-bold">${p.title}</h3>

<button onclick="openPost(${i})"
class="text-indigo-600 mt-2">
قراءة
</button>

</div>

</div>
`

})

}

function openPost(i){

const post=posts[i]

document.body.innerHTML=`

<div class="max-w-4xl mx-auto p-8">

<h1 class="text-4xl font-bold mb-6">${post.title}</h1>

<div class="article">${marked.parse(post.content)}</div>

<a href="index.html"
class="text-indigo-600 mt-8 block">
العودة
</a>

</div>
`

}

document.getElementById("newPost").onclick=()=>{

const u=prompt("اسم المستخدم")

const p=prompt("كلمة المرور")

if(u!==ADMIN_USER||p!==ADMIN_PASS){

alert("غير مصرح")

return

}

document.getElementById("editorModal").classList.remove("hidden")
document.getElementById("editorModal").classList.add("flex")

}

document.getElementById("close").onclick=()=>{

document.getElementById("editorModal").classList.add("hidden")

}

document.getElementById("save").onclick=()=>{

const title=document.getElementById("title").value

const content=document.getElementById("editor").innerHTML

const img=content.match(/<img.*?src="(.*?)"/)?.[1]||"https://picsum.photos/600/400"

posts.unshift({

title,

content,

image:img

})

localStorage.setItem("posts",JSON.stringify(posts))

location.reload()

}

const editor=document.getElementById("editor")

editor.addEventListener("dragover",e=>e.preventDefault())

editor.addEventListener("drop",e=>{

e.preventDefault()

const file=e.dataTransfer.files[0]

if(!file.type.startsWith("image"))return

const reader=new FileReader()

reader.onload=e=>{

editor.innerHTML+=`<img src="${e.target.result}">`

}

reader.readAsDataURL(file)

})

renderPosts()

</script>

</body>
</html>
