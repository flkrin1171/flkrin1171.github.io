<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فلكرين - Flkrin | مدونة الفيجوال نوفل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .ko-fi-gradient { background: linear-gradient(90deg, #ff5f5f 0%, #ffdd67 100%); }
        .admin-only { display: none; }
        .is-admin .admin-only { display: block; }
        .is-admin .edit-border { outline: 2px dashed #4f46e5; cursor: pointer; }
        .prose img { border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="pb-20">

    <div class="ko-fi-gradient text-center py-2 px-4 text-slate-900 font-bold text-sm shadow-md">
        <span>دعمك يضمن استمرار الترجمة ☕</span>
        <a href="https://ko-fi.com/flkrin" target="_blank" class="mr-4 bg-white px-3 py-1 rounded-full hover:shadow-lg transition">ادعمني على Ko-fi</a>
    </div>

    <nav class="bg-white shadow-sm sticky top-0 z-40">
        <div class="container mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <img src="https://www.gstatic.com/youtube/img/branding/youtubelogo/svg/youtubelogo.svg" class="h-6" alt="YouTube">
                <h1 class="text-2xl font-black text-slate-800 tracking-tighter">FLKRIN / فلكرين</h1>
            </div>
            
            <div class="flex items-center gap-6">
                <a href="https://youtube.com/@Flkrin" target="_blank" class="text-red-600 hover:scale-110 transition"><i class="fab fa-youtube fa-xl"></i></a>
                <a href="https://discord.gg/yourlink" target="_blank" class="text-indigo-600 hover:scale-110 transition"><i class="fab fa-discord fa-xl"></i></a>
                <button id="loginBtn" onclick="handleLogin()" class="text-xs text-slate-400 hover:text-slate-600">تسجيل دخول الإدارة</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        
        <div class="admin-only bg-indigo-50 p-6 rounded-2xl mb-10 border-2 border-indigo-200">
            <h2 class="font-bold text-indigo-800 mb-4 text-lg"><i class="fas fa-tools ml-2"></i>لوحة التحكم (أهلاً طه)</h2>
            <div class="flex flex-wrap gap-3">
                <button onclick="openPostModal()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl hover:bg-indigo-700 shadow-md">انشاء مقال جديد +</button>
                <button onclick="manageCategories()" class="bg-white border border-indigo-200 text-indigo-700 px-6 py-2 rounded-xl hover:bg-indigo-100">إدارة التصنيفات</button>
                <button onclick="logout()" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl text-sm">خروج</button>
            </div>
        </div>

        <div id="categoryFilter" class="flex flex-wrap gap-2 mb-8">
            <button onclick="renderPosts('All')" class="bg-slate-800 text-white px-5 py-2 rounded-full text-sm">الكل</button>
            </div>

        <div id="postsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="postModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden max-h-[90vh] overflow-y-auto">
            <div class="p-8">
                <h3 class="text-2xl font-bold mb-6 text-slate-800">مقال فيجوال نوفل جديد</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <label class="block text-sm font-bold">العنوان (اجعله جذاباً)</label>
                        <input type="text" id="pTitle" class="w-full bg-slate-50 p-4 rounded-2xl border-0 focus:ring-2 focus:ring-indigo-500">
                        
                        <label class="block text-sm font-bold">رابط صورة الغلاف (Thumbnail)</label>
                        <input type="text" id="pImage" class="w-full bg-slate-50 p-4 rounded-2xl border-0" placeholder="https://...">
                        
                        <label class="block text-sm font-bold">التصنيف</label>
                        <select id="pCat" class="w-full bg-slate-50 p-4 rounded-2xl border-0"></select>
                    </div>
                    <div class="space-y-4">
                        <label class="block text-sm font-bold">محتوى المقال (Markdown)</label>
                        <textarea id="pContent" class="w-full bg-slate-50 p-4 rounded-2xl border-0 h-64 font-mono text-sm" placeholder="اكتب مراجعتك هنا..."></textarea>
                    </div>
                </div>
                <div class="mt-8 flex gap-4">
                    <button onclick="savePost()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">نشر الآن</button>
                    <button onclick="closeModal()" class="px-8 py-4 text-slate-500 font-bold">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <div id="fullPostView" class="fixed inset-0 bg-white hidden z-50 overflow-y-auto">
        <div class="max-w-4xl mx-auto px-6 py-10">
            <button onclick="closeFullView()" class="mb-8 text-indigo-600 font-bold flex items-center gap-2">
                <i class="fas fa-arrow-right"></i> العودة للرئيسية
            </button>
            <div id="postArea"></div>
            <div class="mt-20 p-8 rounded-3xl bg-amber-50 border-2 border-amber-200 text-center">
                <h4 class="text-xl font-black mb-2">هل أعجبك العمل؟</h4>
                <p class="text-slate-600 mb-6">تبرع بسيط منك يساعدني على توفير وقت لترجمة المزيد من الأعمال</p>
                <a href="https://ko-fi.com/flkrin" target="_blank" class="inline-block bg-[#ff5f5f] text-white px-10 py-4 rounded-full font-black hover:scale-105 transition shadow-xl">
                    <i class="fas fa-coffee ml-2"></i> ادعمني على Ko-fi
                </a>
            </div>
        </div>
    </div>

    <script>
        // --- تهيئة البيانات ---
        let db = JSON.parse(localStorage.getItem('flkrin_site')) || {
            posts: [],
            categories: ['مراجعات', 'ترجمة', 'أخبار', 'شروحات']
        };

        const ADMIN_EMAIL = "ktaha1171@gmail.com";
        let isEditing = null;

        function handleLogin() {
            const email = prompt("أدخل بريدك الإلكتروني للدخول بصلاحيات الإدارة:");
            if(email === ADMIN_EMAIL) {
                document.body.classList.add('is-admin');
                localStorage.setItem('flkrin_admin', 'true');
            } else {
                alert("عذراً، هذا الحساب غير مخول");
            }
        }

        function logout() {
            document.body.classList.remove('is-admin');
            localStorage.removeItem('flkrin_admin');
        }

        if(localStorage.getItem('flkrin_admin') === 'true') document.body.classList.add('is-admin');

        // --- إدارة المقالات ---
        function renderPosts(filter = 'All') {
            const grid = document.getElementById('postsGrid');
            const filtered = filter === 'All' ? db.posts : db.posts.filter(p => p.cat === filter);
            
            grid.innerHTML = filtered.map(post => `
                <article class="bg-white rounded-[2.5rem] overflow-hidden shadow-xl shadow-slate-200/50 hover:shadow-2xl transition duration-500 group border border-slate-100">
                    <div class="relative h-64 overflow-hidden">
                        <img src="${post.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700" alt="${post.title}">
                        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-4 py-1 rounded-full text-xs font-black text-indigo-600 shadow-sm">${post.cat}</div>
                    </div>
                    <div class="p-8">
                        <h2 class="text-2xl font-black text-slate-800 leading-tight mb-4 group-hover:text-indigo-600 transition">${post.title}</h2>
                        <div class="flex justify-between items-center">
                            <button onclick="viewPost(${post.id})" class="text-indigo-600 font-bold hover:gap-3 transition-all flex items-center gap-2">اقرأ المقال <i class="fas fa-chevron-left"></i></button>
                            <div class="admin-only flex gap-3">
                                <button onclick="editPost(${post.id})" class="text-blue-500 hover:scale-120"><i class="fas fa-edit"></i></button>
                                <button onclick="deletePost(${post.id})" class="text-red-500 hover:scale-120"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                </article>
            `).join('');
            renderCatFilters();
        }

        function savePost() {
            const post = {
                id: isEditing || Date.now(),
                title: document.getElementById('pTitle').value,
                image: document.getElementById('pImage').value || 'https://picsum.photos/800/600',
                cat: document.getElementById('pCat').value,
                content: document.getElementById('pContent').value,
                date: new Date().toLocaleDateString('ar-EG')
            };

            if(isEditing) {
                const idx = db.posts.findIndex(p => p.id === isEditing);
                db.posts[idx] = post;
            } else {
                db.posts.unshift(post);
            }
            
            syncDB();
            closeModal();
            renderPosts();
        }

        function deletePost(id) {
            if(confirm('حذف المقال نهائياً؟')) {
                db.posts = db.posts.filter(p => p.id !== id);
                syncDB();
                renderPosts();
            }
        }

        function viewPost(id) {
            const post = db.posts.find(p => p.id === id);
            document.getElementById('postArea').innerHTML = `
                <img src="${post.image}" class="w-full h-96 object-cover rounded-[3rem] shadow-2xl mb-10">
                <span class="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-sm font-bold">${post.cat}</span>
                <h1 class="text-5xl font-black text-slate-800 my-6 leading-tight">${post.title}</h1>
                <p class="text-slate-400 mb-10 font-bold">${post.date}</p>
                <div class="prose prose-indigo max-w-none leading-loose text-slate-700 text-lg">
                    ${marked.parse(post.content)}
                </div>
            `;
            document.getElementById('fullPostView').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        // --- التصنيفات ---
        function renderCatFilters() {
            const container = document.getElementById('categoryFilter');
            const catSelect = document.getElementById('pCat');
            
            let buttons = `<button onclick="renderPosts('All')" class="bg-slate-100 text-slate-600 px-6 py-2 rounded-full text-sm font-bold hover:bg-slate-200">الكل</button>`;
            buttons += db.categories.map(c => `<button onclick="renderPosts('${c}')" class="bg-white border border-slate-200 text-slate-600 px-6 py-2 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 transition">${c}</button>`).join('');
            
            container.innerHTML = buttons;
            catSelect.innerHTML = db.categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function manageCategories() {
            const action = prompt("1. إضافة تصنيف\n2. حذف تصنيف\n(اكتب الرقم)");
            if(action === "1") {
                const name = prompt("اسم التصنيف الجديد:");
                if(name) db.categories.push(name);
            } else if(action === "2") {
                const name = prompt("اسم التصنيف المراد حذفه بدقة:");
                db.categories = db.categories.filter(c => c !== name);
            }
            syncDB();
            renderCatFilters();
        }

        // --- وظائف عامة ---
        function syncDB() { localStorage.setItem('flkrin_site', JSON.stringify(db)); }
        function openPostModal() { document.getElementById('postModal').classList.remove('hidden'); }
        function closeModal() { 
            document.getElementById('postModal').classList.add('hidden'); 
            isEditing = null;
            document.querySelectorAll('#postModal input, #postModal textarea').forEach(i => i.value = '');
        }
        function closeFullView() { document.getElementById('fullPostView').classList.add('hidden'); }
        
        function editPost(id) {
            const post = db.posts.find(p => p.id === id);
            isEditing = id;
            document.getElementById('pTitle').value = post.title;
            document.getElementById('pImage').value = post.image;
            document.getElementById('pCat').value = post.cat;
            document.getElementById('pContent').value = post.content;
            openPostModal();
        }

        window.onload = () => renderPosts();
    </script>
</body>
</html>
